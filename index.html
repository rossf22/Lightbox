<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery with Lightbox</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="lightbox.css">
  <!-- Link to the JavaScript file -->
  <script src="lightbox.js" defer></script>
</head>
<body>

  <div class="wrapper">

    <header>
      <h1>Image Gallery with Lightbox</h1>
      <p>Click any image below to view a larger version.</p>
    </header>

    <main>
      <!--
        GALLERY SECTION
        This section contains the thumbnail images.
        Each image has the class "thumbnail" so JavaScript can find it.
      -->
      <section class="gallery-section">
        <h2>Photo Gallery</h2>

        <div class="gallery">
          <img src="images/smpte.jpg" alt="SMPTE color bars" class="thumbnail">
          <img src="images/indian.jpg" alt="native american test pattern" class="thumbnail">
          <img src="images/bbc.jpg" alt="bbc test card" class="thumbnail">
        </div>

      </section>
    </main>

    <footer>
      <p>Web Design I - Coding Exercise Example</p>
    </footer>

  </div>

  <!--
    LIGHTBOX
    This is hidden when the page first loads.
    JavaScript will make it appear when a thumbnail is clicked.
  -->
  <section id="lightbox" class="lightbox">

    <!--
      This inner box holds the larger image and the close button.
      It keeps the content centered inside the dark overlay.
    -->
    <div class="lightbox-content">

      <!--
        Close button.
        Students can click this to hide the lightbox.
      -->
      <button id="close-btn" class="close-btn">&times;</button>

      <!--
        This image will change when a thumbnail is clicked.
        JavaScript replaces the src and alt attributes.
      -->
      <img id="lightbox-img" src="" alt="">

    </div>
  </section>

</body>
</html>
